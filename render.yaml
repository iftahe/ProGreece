services:
  # Backend Service
  - type: web
    name: greece-project-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -k uvicorn.workers.UvicornWorker main:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        sync: false # User will need to set this if they add a Postgres DB later, or it will fallback to SQLite (ephemeral)

  # Frontend Service
  - type: static
    name: greece-project-web
    env: static
    root: frontend # Sets the build context to the frontend directory
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist # Path relative to the root (frontend)
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: greece-project-api
          property: url
